<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>الى زينب ❤️</title>

<style>

body{
background:black;
color:white;
text-align:center;
font-family:Arial;
overflow:hidden;
}

/* النجوم */
.stars{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
z-index:-1;
}

.star{
position:absolute;
width:2px;
height:2px;
background:white;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:0.2;}
to{opacity:1;}
}

h1{
color:pink;
font-size:40px;
margin-top:40px;
}

p{
font-size:20px;
}

img{
width:250px;
border-radius:20px;
margin:15px;
box-shadow:0 0 15px pink;
}

button{
padding:15px;
font-size:18px;
background:pink;
border:none;
border-radius:10px;
cursor:pointer;
}

/* القلوب */
.heart{
position:fixed;
color:red;
font-size:20px;
animation:fall 5s linear infinite;
}

@keyframes fall{
0%{
transform:translateY(-10px);
opacity:1;
}
100%{
transform:translateY(100vh);
opacity:0;
}
}

</style>

</head>

<body>

<div class="stars" id="stars"></div>

<h1>الى زينب ❤️</h1>

<p>سويت هذا الموقع بس علمودك</p>

<img src="photo1.jpg">
<img src="photo2.jpg">

<br>

<button onclick="alert('احبك ❤️')">
اضغط هنا
</button>

<audio autoplay loop>
<source src="song.mp3" type="audio/mpeg">
</audio>

<script>

/* النجوم */
for(let i=0;i<100;i++){
let star=document.createElement("div");
star.className="star";
star.style.left=Math.random()*100+"vw";
star.style.top=Math.random()*100+"vh";
document.getElementById("stars").appendChild(star);
}

/* القلوب */
function createHeart(){
const heart=document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},5000);
}

setInterval(createHeart,400);

</script>

</body>
</html>
